# Islamic Open Finance Platform - Umbrella Chart
# Deploys IOF backend services as a unified platform

apiVersion: v2
name: iof-platform
description: Islamic Open Finance Platform - Complete deployment
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - islamic-finance
  - shariah
  - banking
  - fintech

maintainers:
  - name: Islamic Open Finance
    email: ops@islamicopenfinance.org

# Services are deployed as Deployment + Service pairs controlled by
# values.yaml enable flags. External dependencies (databases, cache)
# are declared as optional sub-chart dependencies below.
#
# Services managed:
#   - rail-api (port 3000)
#   - analytics-api (port 3001)
#   - ledger-service (port 3002)
#   - finops-api (port 3003)
#   - obp-gateway (port 3004)
#   - obp-demo-server (port 3005)
#   - document-renderer (port 3006)
#   - cerbos (port 3592)

dependencies:
  - name: postgresql
    version: "~15.5"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: "~19.5"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
  - name: cerbos
    version: "~0.38"
    repository: "https://download.cerbos.dev/helm-charts"
    condition: cerbos.external
