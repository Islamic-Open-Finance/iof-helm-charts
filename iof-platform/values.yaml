# Islamic Open Finance Platform - Default Values
# Mode A: Bundled deployment with selective rail enablement

global:
  # Deployment mode: "hosted" | "byoc" | "on-premise"
  deploymentMode: hosted

  # Environment: "sandbox" | "uat" | "production" | "dr"
  environment: sandbox

  # Tenant configuration
  tenant:
    id: ""
    name: ""

  # Image registry
  imageRegistry: ghcr.io/islamic-open-finance
  imagePullPolicy: IfNotPresent

  # Shared infrastructure
  postgres:
    enabled: true
    host: postgres.default.svc.cluster.local
    port: 5432
    database: iof
    username: iof
    # Password from secret

  clickhouse:
    enabled: true
    host: clickhouse.default.svc.cluster.local
    port: 9000
    database: iof

  redis:
    enabled: true
    host: redis.default.svc.cluster.local
    port: 6379

  meilisearch:
    enabled: true
    host: meilisearch.default.svc.cluster.local
    port: 7700

  # Security
  security:
    mfa:
      enabled: false
    encryption:
      atRest: true
      inTransit: true

# Core Infrastructure (always enabled)
core:
  enabled: true
  replicas: 3
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 2Gi

# Rail Configuration
# Enable/disable rails based on SKU entitlements
rails:
  # Metadata (horizontal)
  metadata:
    enabled: true
    replicas: 2
    resources:
      limits:
        cpu: "1"
        memory: 2Gi

  # Taxonomy (horizontal)
  taxonomy:
    enabled: true
    replicas: 2

  # Search (horizontal)
  search:
    enabled: true
    replicas: 3

  # Events (horizontal)
  events:
    enabled: true
    replicas: 2

  # Contracts (domain)
  contracts:
    enabled: false
    replicas: 3
    resources:
      limits:
        cpu: "2"
        memory: 4Gi

  # KYC (domain)
  kyc:
    enabled: false
    replicas: 2

  # Compliance (domain)
  compliance:
    enabled: false
    replicas: 2

  # AML (domain)
  aml:
    enabled: false
    replicas: 2

  # Clearing (domain)
  clearing:
    enabled: false
    replicas: 3
    resources:
      limits:
        cpu: "4"
        memory: 8Gi

  # Treasury (domain)
  treasury:
    enabled: false
    replicas: 2

  # Risk (domain)
  risk:
    enabled: false
    replicas: 2

  # Portfolio (domain)
  portfolio:
    enabled: false
    replicas: 2

  # Governance (domain)
  governance:
    enabled: false
    replicas: 2

  # Reporting (domain)
  reporting:
    enabled: false
    replicas: 2

  # ============================================
  # Banking-Grade Operational Rails
  # ============================================

  # Records Retention (operational)
  retention:
    enabled: false
    replicas: 2
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
    config:
      defaultRetentionDays: 2555 # 7 years
      wormStorageEnabled: true
      legalHoldRequiresDualApproval: true

  # Secrets & Keys (operational)
  secrets:
    enabled: false
    replicas: 2
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
    config:
      kmsProvider: "aws" # aws | local | hsm
      keyRotationDays: 90
      hsmEnabled: false
      auditAllOperations: true

  # Limits & Controls (operational)
  limits:
    enabled: false
    replicas: 3
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
    config:
      fourEyesApprovalEnabled: true
      breachAlertThreshold: 80 # percentage
      velocityCheckEnabled: true
      realTimeEnforcement: true

  # Data Quality (operational)
  dataQuality:
    enabled: false
    replicas: 2
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
    config:
      anomalyDetectionEnabled: true
      qualityScoringEnabled: true
      validationStrictMode: true
      mlModelEndpoint: ""

  # Integration Hub (operational)
  integrations:
    enabled: false
    replicas: 2
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
    config:
      maxConcurrentSyncs: 10
      syncRetryAttempts: 3
      cdcEnabled: true
      connectorTypes:
        - REST_API
        - DATABASE
        - SFTP
        - MESSAGE_QUEUE
        - WEBHOOK

  # SLA & Incident (operational)
  slaIncident:
    enabled: false
    replicas: 2
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
    config:
      statusPageEnabled: true
      rcaWorkflowEnabled: true
      alertChannels:
        - slack
        - pagerduty
        - email
      defaultSLAs:
        availability: 99.9
        latencyP99Ms: 200
        errorRatePercent: 0.1

# SKU-specific configurations
skuProfiles:
  # Sandbox Free
  sandbox-free:
    rails:
      metadata:
        enabled: true
      taxonomy:
        enabled: true
      search:
        enabled: true

  # Banking Core
  banking-core:
    rails:
      contracts:
        enabled: true
      kyc:
        enabled: true
      compliance:
        enabled: true
      aml:
        enabled: true
      treasury:
        enabled: true
      reporting:
        enabled: true
      limits:
        enabled: true
      secrets:
        enabled: true

  # National Rail
  national-rail:
    rails:
      clearing:
        enabled: true
      routing:
        enabled: true
      messages:
        enabled: true
      reconciliation:
        enabled: true
      reporting:
        enabled: true
      limits:
        enabled: true

  # Funds Pro
  funds-pro:
    rails:
      contracts:
        enabled: true
      portfolio:
        enabled: true
      governance:
        enabled: true
      reporting:
        enabled: true
      limits:
        enabled: true

  # Compliance Plus
  compliance-plus:
    rails:
      contracts:
        enabled: true
      kyc:
        enabled: true
      compliance:
        enabled: true
      aml:
        enabled: true
      retention:
        enabled: true
      limits:
        enabled: true
      dataQuality:
        enabled: true

  # Enterprise
  enterprise:
    rails:
      # All domain rails
      contracts:
        enabled: true
      kyc:
        enabled: true
      compliance:
        enabled: true
      aml:
        enabled: true
      clearing:
        enabled: true
      treasury:
        enabled: true
      risk:
        enabled: true
      portfolio:
        enabled: true
      governance:
        enabled: true
      reporting:
        enabled: true
      # All banking-grade operational rails
      retention:
        enabled: true
      secrets:
        enabled: true
      limits:
        enabled: true
      dataQuality:
        enabled: true
      integrations:
        enabled: true
      slaIncident:
        enabled: true

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.iof.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: iof-tls
      hosts:
        - api.iof.example.com

# Monitoring
monitoring:
  prometheus:
    enabled: true
  grafana:
    enabled: true
  alertmanager:
    enabled: true

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
