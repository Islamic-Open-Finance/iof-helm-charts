# Islamic Open Finance - Production Values
# Enterprise-grade, banking-compliant Kubernetes configuration
# SOC2 Type 2, GDPR, ISO 27001, ISO 20022 aligned

global:
  environment: production
  domain: islamicopenfinance.com
  imageRegistry: 697697502658.dkr.ecr.eu-west-1.amazonaws.com
  imageTag: "v0.1.0" # CI/CD overrides with git SHA — never use 'latest' in production

  # Security Context - Run as non-root
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # Pod Security Standards
  podSecurityStandards:
    enforce: restricted
    audit: restricted
    warn: restricted

  # Multi-region configuration
  regions:
    primary: eu-west-1
    secondary:
      - eu-west-2
      - me-south-1
      - ap-southeast-1

# =============================================================================
# Rail API - Core Backend Service
# =============================================================================
railApi:
  enabled: true
  replicaCount: 5

  image:
    repository: iof/rail-api
    pullPolicy: Always

  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"

  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
        selectPolicy: Max

  podDisruptionBudget:
    minAvailable: 3

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: rail-api
            topologyKey: topology.kubernetes.io/zone

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: rail-api

  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  env:
    NODE_ENV: production
    LOG_LEVEL: info
    ENABLE_METRICS: "true"
    ENABLE_TRACING: "true"
    ENABLE_RATE_LIMITING: "true"
    RATE_LIMIT_WINDOW_MS: "60000"
    RATE_LIMIT_MAX_REQUESTS: "1000"

  # Secrets from AWS Secrets Manager / Kubernetes Secrets
  secretRefs:
    - name: iof-database-credentials
    - name: iof-redis-credentials
    - name: iof-jwt-secret
    - name: iof-api-encryption-key

# =============================================================================
# Analytics API - ClickHouse Powered
# =============================================================================
analyticsApi:
  enabled: true
  replicaCount: 3

  image:
    repository: iof/analytics-api
    pullPolicy: Always

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    minAvailable: 2

# =============================================================================
# Ledger Service - TigerBeetle
# =============================================================================
ledgerService:
  enabled: true
  replicaCount: 3

  image:
    repository: iof/ledger-service
    pullPolicy: Always

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  podDisruptionBudget:
    minAvailable: 2

# =============================================================================
# PostgreSQL - Primary Database
# =============================================================================
postgresql:
  enabled: true
  architecture: replication

  auth:
    existingSecret: iof-database-credentials
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
      replicationPasswordKey: replication-password

  primary:
    persistence:
      enabled: true
      size: 500Gi
      storageClass: gp3-encrypted

    resources:
      requests:
        cpu: "2000m"
        memory: "8Gi"
      limits:
        cpu: "8000m"
        memory: "32Gi"

    extendedConfiguration: |
      max_connections = 500
      shared_buffers = 8GB
      effective_cache_size = 24GB
      maintenance_work_mem = 2GB
      checkpoint_completion_target = 0.9
      wal_buffers = 64MB
      default_statistics_target = 100
      random_page_cost = 1.1
      effective_io_concurrency = 200
      work_mem = 16MB
      min_wal_size = 1GB
      max_wal_size = 4GB
      max_worker_processes = 8
      max_parallel_workers_per_gather = 4
      max_parallel_workers = 8
      max_parallel_maintenance_workers = 4
      log_statement = 'ddl'
      log_min_duration_statement = 1000
      ssl = on
      ssl_cert_file = '/opt/bitnami/postgresql/certs/tls.crt'
      ssl_key_file = '/opt/bitnami/postgresql/certs/tls.key'

    podAntiAffinityPreset: hard
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule

  readReplicas:
    replicaCount: 3
    persistence:
      enabled: true
      size: 500Gi
      storageClass: gp3-encrypted

    resources:
      requests:
        cpu: "1000m"
        memory: "4Gi"
      limits:
        cpu: "4000m"
        memory: "16Gi"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  backup:
    enabled: true
    cronjob:
      schedule: "0 2 * * *"
      storage:
        s3:
          bucket: iof-database-backups
          region: eu-west-1

# =============================================================================
# Redis - Caching and Session Store
# =============================================================================
redis:
  enabled: true
  architecture: replication

  auth:
    enabled: true
    existingSecret: iof-redis-credentials
    existingSecretPasswordKey: redis-password

  master:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: gp3-encrypted

    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "8Gi"

  replica:
    replicaCount: 3
    persistence:
      enabled: true
      size: 50Gi

    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "4Gi"

  sentinel:
    enabled: true
    quorum: 2

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# =============================================================================
# ClickHouse - Analytics Database
# =============================================================================
clickhouse:
  enabled: true
  replicaCount: 5
  shards: 3
  replicasPerShard: 2

  persistence:
    enabled: true
    size: 2Ti
    storageClass: gp3-encrypted

  resources:
    requests:
      cpu: "2000m"
      memory: "8Gi"
    limits:
      cpu: "8000m"
      memory: "32Gi"

  zookeeper:
    enabled: true
    replicaCount: 3

# =============================================================================
# TigerBeetle - High-Performance Ledger
# =============================================================================
tigerbeetle:
  enabled: true
  replicaCount: 3

  persistence:
    enabled: true
    size: 100Gi
    storageClass: io2-encrypted

  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"

# =============================================================================
# Meilisearch - Full-Text Search
# =============================================================================
meilisearch:
  enabled: true
  replicaCount: 3

  persistence:
    enabled: true
    size: 100Gi
    storageClass: gp3-encrypted

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"

# =============================================================================
# Ingress - NGINX Ingress Controller
# =============================================================================
ingress:
  enabled: true
  className: nginx-internal

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";

  hosts:
    - host: api.islamicopenfinance.com
      paths:
        - path: /
          pathType: Prefix
          service:
            name: rail-api
            port: 3000

  tls:
    - secretName: iof-tls-certificate
      hosts:
        - api.islamicopenfinance.com
        - "*.islamicopenfinance.com"

# =============================================================================
# Network Policies - Zero Trust Networking
# =============================================================================
networkPolicies:
  enabled: true
  defaultDenyIngress: true
  defaultDenyEgress: false

  allowedNamespaces:
    - istio-system
    - monitoring
    - logging

# =============================================================================
# Prometheus Monitoring
# =============================================================================
prometheus:
  enabled: true

  server:
    retention: "90d"
    persistentVolume:
      enabled: true
      size: 500Gi
      storageClass: gp3-encrypted

    resources:
      requests:
        cpu: "1000m"
        memory: "4Gi"
      limits:
        cpu: "4000m"
        memory: "16Gi"

  alertmanager:
    enabled: true
    persistentVolume:
      enabled: true
      size: 10Gi

# =============================================================================
# Grafana Dashboards
# =============================================================================
grafana:
  enabled: true
  replicas: 2

  persistence:
    enabled: true
    size: 10Gi

  adminPassword:
    existingSecret: iof-grafana-credentials
    passwordKey: admin-password

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "iof-dashboards"
          orgId: 1
          folder: "IOF"
          type: file
          disableDeletion: true
          editable: false
          options:
            path: /var/lib/grafana/dashboards/iof

# =============================================================================
# Logging - Loki Stack
# =============================================================================
loki:
  enabled: true

  persistence:
    enabled: true
    size: 500Gi
    storageClass: gp3-encrypted

  retention:
    enabled: true
    period: 30d

# =============================================================================
# Service Mesh - Istio (Optional)
# =============================================================================
istio:
  enabled: false

  mtls:
    mode: STRICT

  tracing:
    enabled: true
    sampling: 100

# =============================================================================
# Secrets Management - External Secrets Operator
# =============================================================================
externalSecrets:
  enabled: true

  secretStore:
    provider: aws
    region: eu-west-1
    service: SecretsManager

  refreshInterval: 1h

# =============================================================================
# Backup and Disaster Recovery
# =============================================================================
velero:
  enabled: true

  schedules:
    daily:
      schedule: "0 3 * * *"
      ttl: "720h"
      includedNamespaces:
        - iof-production
      storageLocation: default

    hourly-critical:
      schedule: "0 * * * *"
      ttl: "72h"
      includedResources:
        - secrets
        - configmaps
        - persistentvolumeclaims
      storageLocation: default

  configuration:
    backupStorageLocation:
      bucket: iof-velero-backups
      config:
        region: eu-west-1
        s3ForcePathStyle: false

# =============================================================================
# Compliance and Audit
# =============================================================================
compliance:
  # SOC2 Type 2 controls
  soc2:
    enabled: true
    auditLogging: true
    accessControls: true
    encryptionAtRest: true
    encryptionInTransit: true

  # GDPR compliance
  gdpr:
    enabled: true
    dataRetentionDays: 2555 # 7 years for financial data
    rightToErasure: true
    dataPortability: true

  # ISO 27001 controls
  iso27001:
    enabled: true
    informationSecurityPolicy: true
    accessControl: true
    cryptography: true
    operationalSecurity: true

  # ISO 20022 messaging
  iso20022:
    enabled: true
    messageValidation: true
    marketPractices:
      - CBPR+
      - GCC
