# Islamic Open Finance Platform - Helm Chart Values
# Default values for production deployment

global:
  # Image registry and tag configuration
  imageRegistry: ghcr.io
  imageOrganization: islamic-open-finance
  imageTag: "v0.1.0" # CI/CD overrides with git SHA or SemVer tag — never use 'latest'
  imagePullPolicy: IfNotPresent

  # Deployment configuration
  replicaCount: 2
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Resource defaults
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Rail API Service
railApi:
  enabled: true
  name: rail-api
  replicaCount: 3
  image:
    repository: rail-api
    tag: "" # Uses global.imageTag if empty
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/rate-limit: "100"
    hosts:
      - host: api.islamicopenfinance.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: rail-api-tls
        hosts:
          - api.islamicopenfinance.com
  env:
    NODE_ENV: production
    PORT: "3000"
    LOG_LEVEL: info
    ENABLE_METRICS: "true"
    ENABLE_TRACING: "true"

# Analytics API Service
analyticsApi:
  enabled: true
  name: analytics-api
  replicaCount: 2
  image:
    repository: analytics-api
    tag: ""
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
  env:
    NODE_ENV: production
    PORT: "3001"

# Ledger Service (TigerBeetle integration)
ledgerService:
  enabled: true
  name: ledger-service
  replicaCount: 2
  image:
    repository: ledger-service
    tag: ""
  service:
    type: ClusterIP
    port: 3002
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  env:
    NODE_ENV: production
    PORT: "3002"
    TIGERBEETLE_CLUSTER_ID: "0"
    TIGERBEETLE_REPLICA_ADDRESSES: "tigerbeetle:3000"

# NOTE: Frontend apps (admin-portal, customer-dashboard, api-explorer,
# developer-portal, billing-dashboard) deploy to Cloudflare Pages.
# See .github/workflows/deploy.yml for frontend deployment config.

# OBP Gateway Service (port 3004 per PORTS.md)
obpGateway:
  enabled: true
  name: obp-gateway
  replicaCount: 2
  image:
    repository: obp-gateway
    tag: ""
  service:
    type: ClusterIP
    port: 3004
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  env:
    NODE_ENV: production
    PORT: "3004"
    OBP_API_HOST: "https://api.openbankproject.com"

# FinOps API Service (port 3003 per PORTS.md)
finopsApi:
  enabled: true
  name: finops-api
  replicaCount: 2
  image:
    repository: finops-api
    tag: ""
  service:
    type: ClusterIP
    port: 3003
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  env:
    NODE_ENV: production
    PORT: "3003"

# Document Renderer (Carbone + LibreOffice)
documentRenderer:
  enabled: true
  replicaCount: 1
  image:
    repository: document-renderer
    tag: ""
  service:
    type: ClusterIP
    port: 3006
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  env:
    NODE_ENV: production
    PORT: "3006"
    CARBONE_WORKERS: "2"
    LIBREOFFICE_PATH: "/usr/lib/libreoffice"
    S3_DOCUMENTS_BUCKET: "iof-documents"

# OBP Demo Server (for development/sandbox)
obpMock:
  enabled: false # Disabled in production, enabled in sandbox
  name: obp-demo-server
  replicaCount: 1
  image:
    repository: obp-demo-server
    tag: ""
  service:
    type: ClusterIP
    port: 3005
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  env:
    NODE_ENV: production
    PORT: "3005"

# PostgreSQL Configuration
postgresql:
  # External PostgreSQL (RDS)
  external:
    enabled: true
    host: "" # Set via --set or environment-specific values
    port: 5432
    database: iof_production
    username: iof_user
    # Password from secret: iof-db-credentials
  # Internal PostgreSQL (for development only)
  internal:
    enabled: false

# Redis Configuration (ElastiCache)
redis:
  external:
    enabled: true
    host: "" # Set via --set or environment-specific values
    port: 6379
    # Password from secret if required
  internal:
    enabled: false

# Meilisearch Configuration
meilisearch:
  enabled: true
  externalUrl: "" # Set via --set or environment-specific values
  masterKeySecret: meilisearch-master-key

# TigerBeetle Ledger
tigerbeetle:
  enabled: true
  replicaCount: 1
  cluster:
    id: 0
    replicaCount: 1
  server:
    port: 3000
    cacheGrid: 2GB
    cacheAccounts: 1GB
    cacheTransfers: 1GB
  image:
    repository: ghcr.io/tigerbeetle/tigerbeetle
    tag: "0.15.3"
  persistence:
    enabled: true
    size: 100Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 4000m
      memory: 16Gi

# Cerbos Authorization Service
cerbos:
  enabled: true
  image:
    repository: ghcr.io/cerbos/cerbos
    tag: "0.35.0"
  replicaCount: 2
  service:
    type: ClusterIP
    port: 3592
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  config:
    storage: git
    gitRepo: https://github.com/Islamic-Open-Finance/cerbos-policies.git

# Network Policies
networkPolicies:
  enabled: true
  policyTypes:
    - Ingress
    - Egress

# Service Monitor for Prometheus
serviceMonitor:
  enabled: false # Enable when Prometheus operator is available
  interval: 30s
  scrapeTimeout: 10s

# Pod Disruption Budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ============================================================================
# AWS Integration Configuration
# ============================================================================

aws:
  region: us-east-1
  accountId: "" # Set via --set or environment-specific values

  # Cognito Configuration
  cognito:
    enabled: true
    userPoolId: "" # Set from Terraform outputs
    clientId: "" # Set from Terraform outputs
    domain: "" # Set from Terraform outputs

  # API Gateway Configuration
  apiGateway:
    enabled: true
    invokeUrl: "" # Set from Terraform outputs
    restApiId: "" # Set from Terraform outputs

  # DynamoDB Tables
  dynamodb:
    webhookSubscriptionsTable: "" # Set from Terraform outputs
    webhookDeliveriesTable: ""
    apiKeysTable: ""
    complianceChecksTable: ""
    complianceAlertsTable: ""
    filesTable: ""
    reportsTable: ""
    billingRecordsTable: ""
    emailLogsTable: ""
    exportJobsTable: ""

  # S3 Buckets
  s3:
    reportsBucket: "" # Set from Terraform outputs
    fileUploadsBucket: ""
    dataExportsBucket: ""
    emailTemplatesBucket: ""
    processedFilesBucket: ""
    quarantineBucket: ""

  # SQS Queues
  sqs:
    webhookQueueUrl: "" # Set from Terraform outputs
    dataExportQueueUrl: ""
    complianceAlertsQueueUrl: ""
    fileProcessingQueueUrl: ""
    eventsQueueUrl: ""

  # SNS Topics
  sns:
    platformEventsTopicArn: "" # Set from Terraform outputs
    webhookEventsTopicArn: ""
    complianceAlertsTopicArn: ""
    shariahEventsTopicArn: ""
    contractEventsTopicArn: ""
    kycEventsTopicArn: ""
    paymentEventsTopicArn: ""

  # EventBridge
  eventbridge:
    eventBusName: "" # Set from Terraform outputs
    eventBusArn: ""

  # Secrets Manager
  secrets:
    databaseSecretArn: "" # Set from Terraform outputs
    jwtSecretArn: ""
    webhookSecretArn: ""
    obpSecretArn: ""

# ============================================================================
# IRSA (IAM Roles for Service Accounts)
# ============================================================================

serviceAccount:
  create: true
  name: iof-service-account
  annotations:
    # Set EKS IAM role ARN for AWS service access
    eks.amazonaws.com/role-arn: "" # Set from Terraform outputs
