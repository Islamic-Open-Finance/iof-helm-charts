{{- if .Values.documentRenderer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iof.fullname" . }}-document-renderer
  labels:
    {{- include "iof.componentLabels" (dict "component" "document-renderer" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.documentRenderer.replicaCount }}
  selector:
    matchLabels:
      {{- include "iof.componentSelectorLabels" (dict "component" "document-renderer" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.documentRenderer.service.port }}"
      labels:
        {{- include "iof.componentSelectorLabels" (dict "component" "document-renderer" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iof.serviceAccountName" . }}
      containers:
        - name: document-renderer
          image: {{ include "iof.image" (dict "root" . "image" .Values.documentRenderer.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.documentRenderer.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.documentRenderer.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.documentRenderer.env.PORT | quote }}
            - name: DOCUMENT_RENDERER_PORT
              value: {{ .Values.documentRenderer.env.PORT | quote }}
            - name: CARBONE_WORKERS
              value: {{ .Values.documentRenderer.env.CARBONE_WORKERS | default "2" | quote }}
            - name: LIBREOFFICE_PATH
              value: {{ .Values.documentRenderer.env.LIBREOFFICE_PATH | default "/usr/lib/libreoffice" | quote }}
            - name: DATABASE_URL
              value: {{ include "iof.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "iof.redisUrl" . | quote }}
            - name: S3_DOCUMENTS_BUCKET
              value: {{ .Values.documentRenderer.env.S3_DOCUMENTS_BUCKET | default "iof-documents" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.documentRenderer.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
