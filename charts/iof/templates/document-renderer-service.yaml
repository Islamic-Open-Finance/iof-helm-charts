{{- if .Values.documentRenderer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iof.fullname" . }}-document-renderer
  labels:
    {{- include "iof.componentLabels" (dict "component" "document-renderer" "root" .) | nindent 4 }}
spec:
  type: {{ .Values.documentRenderer.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.documentRenderer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "iof.componentSelectorLabels" (dict "component" "document-renderer" "root" .) | nindent 4 }}
{{- end }}
