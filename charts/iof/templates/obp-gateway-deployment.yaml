{{- if .Values.obpGateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iof.fullname" . }}-obp-gateway
  labels:
    {{- include "iof.componentLabels" (dict "component" "obp-gateway" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.obpGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "iof.componentSelectorLabels" (dict "component" "obp-gateway" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.obpGateway.service.port }}"
      labels:
        {{- include "iof.componentSelectorLabels" (dict "component" "obp-gateway" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iof.serviceAccountName" . }}
      containers:
        - name: obp-gateway
          image: {{ include "iof.image" (dict "root" . "image" .Values.obpGateway.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.obpGateway.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.obpGateway.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.obpGateway.env.PORT | quote }}
            - name: DATABASE_URL
              value: {{ include "iof.databaseUrl" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iof-db-credentials
                  key: password
            - name: REDIS_URL
              value: {{ include "iof.redisUrl" . | quote }}
            - name: RAIL_API_URL
              value: "http://{{ include "iof.fullname" . }}-rail-api:{{ .Values.railApi.service.port }}"
            - name: OBP_API_HOST
              value: {{ .Values.obpGateway.env.OBP_API_HOST | quote }}
            - name: OBP_CONSUMER_KEY
              valueFrom:
                secretKeyRef:
                  name: iof-obp-credentials
                  key: consumer-key
                  optional: true
            - name: OBP_CONSUMER_SECRET
              valueFrom:
                secretKeyRef:
                  name: iof-obp-credentials
                  key: consumer-secret
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.obpGateway.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
