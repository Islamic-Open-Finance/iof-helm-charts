{{- if .Values.cerbos.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iof.fullname" . }}-cerbos
  labels:
    {{- include "iof.componentLabels" (dict "component" "cerbos" "root" .) | nindent 4 }}
spec:
  type: {{ .Values.cerbos.service.type }}
  ports:
    - name: http
      port: {{ .Values.cerbos.service.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 3593
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "iof.componentSelectorLabels" (dict "component" "cerbos" "root" .) | nindent 4 }}
{{- end }}
