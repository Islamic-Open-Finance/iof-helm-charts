{{- if .Values.podDisruptionBudget.enabled }}
# Rail API PDB
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iof.fullname" . }}-rail-api-pdb
  labels:
    {{- include "iof.componentLabels" (dict "component" "rail-api" "root" .) | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "iof.componentSelectorLabels" (dict "component" "rail-api" "root" .) | nindent 6 }}
---
