# TigerBeetle PDB - special handling for stateful set
{{- if .Values.tigerbeetle.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iof.fullname" . }}-tigerbeetle-pdb
  labels:
    {{- include "iof.labels" . | nindent 4 }}
    app.kubernetes.io/component: tigerbeetle
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: tigerbeetle
{{- end }}
