{{- if .Values.cerbos.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iof.fullname" . }}-cerbos
  labels:
    {{- include "iof.componentLabels" (dict "component" "cerbos" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.cerbos.replicaCount }}
  selector:
    matchLabels:
      {{- include "iof.componentSelectorLabels" (dict "component" "cerbos" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/cerbos-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "iof.componentSelectorLabels" (dict "component" "cerbos" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cerbos
          image: "{{ .Values.cerbos.image.repository }}:{{ .Values.cerbos.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - "server"
            - "--config=/config/.cerbos.yaml"
          ports:
            - name: http
              containerPort: 3592
              protocol: TCP
            - name: grpc
              containerPort: 3593
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: policies
              mountPath: /policies
          livenessProbe:
            httpGet:
              path: /_cerbos/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_cerbos/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.cerbos.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "iof.fullname" . }}-cerbos-config
        - name: policies
          configMap:
            name: {{ include "iof.fullname" . }}-cerbos-policies
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
