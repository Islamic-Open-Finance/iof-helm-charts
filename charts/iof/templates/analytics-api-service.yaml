{{- if .Values.analyticsApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iof.fullname" . }}-analytics-api
  labels:
    {{- include "iof.componentLabels" (dict "component" "analytics-api" "root" .) | nindent 4 }}
spec:
  type: {{ .Values.analyticsApi.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.analyticsApi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "iof.componentSelectorLabels" (dict "component" "analytics-api" "root" .) | nindent 4 }}
{{- end }}
