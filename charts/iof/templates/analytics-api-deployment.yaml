{{- if .Values.analyticsApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iof.fullname" . }}-analytics-api
  labels:
    {{- include "iof.componentLabels" (dict "component" "analytics-api" "root" .) | nindent 4 }}
spec:
  {{- if not .Values.analyticsApi.autoscaling.enabled }}
  replicas: {{ .Values.analyticsApi.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "iof.componentSelectorLabels" (dict "component" "analytics-api" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.analyticsApi.service.port }}"
      labels:
        {{- include "iof.componentSelectorLabels" (dict "component" "analytics-api" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iof.serviceAccountName" . }}
      containers:
        - name: analytics-api
          image: {{ include "iof.image" (dict "root" . "image" .Values.analyticsApi.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.analyticsApi.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.analyticsApi.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.analyticsApi.env.PORT | quote }}
            - name: DATABASE_URL
              value: {{ include "iof.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "iof.redisUrl" . | quote }}
            - name: CLICKHOUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: iof-clickhouse-credentials
                  key: host
                  optional: true
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.analyticsApi.env.CLICKHOUSE_DATABASE | default "iof_analytics" | quote }}
            - name: RAIL_API_URL
              value: "http://{{ include "iof.fullname" . }}-rail-api:{{ .Values.railApi.service.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.analyticsApi.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
