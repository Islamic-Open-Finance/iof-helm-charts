{{- if .Values.obpMock.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iof.fullname" . }}-obp-demo-server
  labels:
    {{- include "iof.componentLabels" (dict "component" "obp-demo-server" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.obpMock.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "iof.componentSelectorLabels" (dict "component" "obp-demo-server" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.obpMock.service.port }}"
      labels:
        {{- include "iof.componentSelectorLabels" (dict "component" "obp-demo-server" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iof.serviceAccountName" . }}
      containers:
        - name: obp-demo-server
          image: {{ include "iof.image" (dict "root" . "image" .Values.obpMock.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.obpMock.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.obpMock.env.NODE_ENV | default "production" | quote }}
            - name: PORT
              value: {{ .Values.obpMock.env.PORT | default "3005" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.obpMock.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
